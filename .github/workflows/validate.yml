name: Validate Skills

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository
        shell: bash
        run: |
          set +e
          ./scripts/validate_repo.sh > validation.log 2>&1
          status=$?
          cat validation.log
          exit "$status"

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-log
          path: validation.log
